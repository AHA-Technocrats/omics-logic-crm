name: Deploy Omics (live)

on:
  push:
    branches:
      - live

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup SSH
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.VPS_SSH_KEY }}

      - name: Deploy to Virtualmin VPS
        run: |
          ssh -o StrictHostKeyChecking=no \
          ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} << 'EOF'

            set -e

            echo "🚀 Deploy started (live)"

            cd /home/ahatech1/domains/omics.ahatech1.com/public_html

            echo "📥 Pulling latest code"
            git pull origin live

            echo "📦 Composer install"
            if [ -f composer.json ]; then
              composer install \
                --no-dev \
                --optimize-autoloader \
                --no-interaction \
                --ignore-platform-req=ext-grpc
            fi

            echo "📦 Frontend build"
            if [ -f package.json ]; then
              npm install
              npm run build
            fi

            echo "🧹 Laravel cleanup"
            if [ -f artisan ]; then
              php artisan migrate --force || true
              php artisan storage:link || true
              php artisan optimize:clear
              php artisan config:cache
              php artisan route:cache
              php artisan view:cache
              php artisan optimize
            fi

            echo "🔒 Setting permissions"
            chmod -R ug+rwx storage bootstrap/cache

            echo "✅ Deploy finished successfully"

          EOF
